name: PR Checks

on:
  pull_request:
    branches: [main, master]
  push:
    branches-ignore: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Cache bun install
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun astro check

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build
        env:
          NODE_OPTIONS: --max-old-space-size=7168
      - name: Build Pagefind index
        run: bun run build:pagefind
        if: success()

      - name: Internal link check
        run: bun run check:links:internal

      - name: Validate content (advisory)
        run: bun run validate:content
        continue-on-error: true

      - name: Security audit (advisory)
        run: bun audit
        continue-on-error: true
